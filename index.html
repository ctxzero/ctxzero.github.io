<div id="particles-js"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS('particles-js', {
  particles: {
    number: { value: 50 },
    color: { value: "#0f0" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 2 },
    move: { enable: true, speed: 1 }
  },
  interactivity: {
    events: { onhover: { enable: true, mode: "repulse" } }
  }
});
</script>
<style>
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: -1;
}
body { margin:0; font-family: monospace; color: #0f0; }
</style>
