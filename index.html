<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ctxzero — Portfolio</title>

<!-- Particles.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
  :root{
    --fg: #e6f7ff;
    --muted: #bcd8ff;
  }
  html,body{height:100%;margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
  /* animated gradient background */
  .bg {
    position:fixed; inset:0; z-index:-2;
    background: linear-gradient(120deg,#0f4bff 0%, #8a2be2 50%, #ff416c 100%);
    background-size: 400% 400%;
    animation: bgAnim 12s ease infinite;
    filter: saturate(1.05) contrast(1.02);
  }
  @keyframes bgAnim{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* particles container (canvas from particles.js) */
  #particles-js{ position:fixed; inset:0; z-index:-1; width:100%; height:100%; }

  /* layout */
  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:3rem;
    box-sizing:border-box;
    color:var(--fg);
    text-align:center;
  }

  .card{
    max-width:920px;
    width:100%;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.06);
    padding:2.2rem;
    border-radius:12px;
    backdrop-filter: blur(6px) saturate(1.1);
    box-shadow: 0 8px 30px rgba(5,10,20,0.5);
  }

  h1{ margin:0 0.2rem 0.6rem; font-weight:600; font-size:1.6rem; letter-spacing:0.4px; color:var(--fg); }
  p.lead{ margin:0 0 1rem; color:var(--muted); font-size:1rem; }
  .meta { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1rem; }
  .pill{ padding:0.45rem 0.85rem; border-radius:999px; background:rgba(255,255,255,0.03); color:var(--fg); font-size:0.9rem; border:1px solid rgba(255,255,255,0.04); }

  /* small terminal style line */
  .terminal {
    margin-top:1.4rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
    color:#DFF7E3;
    background: rgba(0,0,0,0.18);
    border-radius:8px;
    padding:0.9rem 1rem;
    display:inline-block;
    font-size:0.95rem;
  }

  /* responsive */
  @media (max-width:700px){
    .card{ padding:1.2rem; border-radius:10px; }
    h1{ font-size:1.2rem; }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div id="particles-js"></div>

  <div class="wrap">
    <div class="card">
      <h1>ctxzero — Penetration Tester</h1>
      <p class="lead">Pentesting • OSINT • CTFs — Tools: nmap • burp • python • metasploit</p>

      <div class="terminal" id="typed">ctxzero@portfolio:~$ <span id="out">whoami</span></div>

      <div class="meta">
        <div class="pill">eJPT (in progress)</div>
        <div class="pill">GitHub: ctxzero</div>
        <div class="pill">TryHackMe: ctxzero</div>
      </div>
    </div>
  </div>

<script>
/* particles.js configuration — few, subtle, multi-color */
particlesJS('particles-js', {
  "particles": {
    "number": { "value": 40, "density": { "enable": true, "value_area": 900 } },
    "color": { "value": ["#9be7ff","#7b61ff","#ffd1dc","#b3ffdd"] },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.7, "random": true, "anim": { "enable": false } },
    "size": { "value": 3, "random": true, "anim": { "enable": false } },
    "line_linked": {
      "enable": true,
      "distance": 160,
      "color": "#9be7ff",
      "opacity": 0.08,
      "width": 1
    },
    "move": {
      "enable": true,
      "speed": 0.9,
      "direction": "none",
      "random": true,
      "straight": false,
      "out_mode": "out",
      "bounce": false
    }
  },
  "interactivity": {
    "detect_on": "canvas",
    "events": {
      "onhover": { "enable": true, "mode": "repulse" },
      "onclick": { "enable": true, "mode": "push" },
      "resize": true
    },
    "modes": {
      "grab": { "distance": 400, "line_linked": { "opacity": 0.2 } },
      "bubble": { "distance": 250, "size": 0, "duration": 2, "opacity": 0 },
      "repulse": { "distance": 120, "duration": 0.4 },
      "push": { "particles_nb": 3 },
      "remove": { "particles_nb": 2 }
    }
  },
  "retina_detect": true
});

/* tiny typed-like effect (no external lib) */
const out = document.getElementById('out');
const lines = [
  'Bra — Penetration Tester',
  'CTF player • OSINT • Web app security',
  'Open to work • contact: hi@ctxzero.dev'
];
let li = 0, ci = 0;
function typeLoop(){
  if(li >= lines.length) li = 0;
  const cur = lines[li];
  out.textContent = cur.slice(0, ci++);
  if(ci > cur.length){ li++; ci=0; setTimeout(typeLoop, 1200); }
  else setTimeout(typeLoop, 40);
}
setTimeout(typeLoop, 400);
</script>
</body>
</html>
