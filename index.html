<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ctxzero — Scan Grid</title>
<style>
  html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, monospace;}
  :root{ --bg1:#071229; --bg2:#10203a; --accent: #60d3ff; --accent2: #8a6cff; }
  body{
    background: linear-gradient(180deg,var(--bg1), var(--bg2) 60%);
    color:#e6f7ff;
    display:flex; align-items:center; justify-content:center; padding:28px;
  }

  .stage{
    width:min(1100px,95vw);
    height:min(560px,70vh);
    position:relative;
    border-radius:12px;
    overflow:hidden;
    box-shadow: 0 12px 40px rgba(5,10,20,0.6);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.03);
  }
  /* grid tiles */
  .grid{
    display:grid;
    grid-template-columns: repeat(16,1fr);
    grid-auto-rows: 1fr;
    gap:6px;
    padding:18px;
    height:100%;
    box-sizing:border-box;
  }
  .cell{
    background: rgba(255,255,255,0.02);
    border-radius:6px;
    transition: transform 220ms ease, background 220ms;
    box-shadow: inset 0 -2px 6px rgba(0,0,0,0.45);
  }
  /* animated highlight sequence */
  .cell:nth-child(4n){ animation: pulse 3.6s linear infinite; animation-delay: calc(var(--i) * -0.08s); }
  @keyframes pulse{
    0%{ transform: scale(1); background: rgba(96,211,255,0.03); }
    50%{ transform: scale(1.02); background: rgba(138,108,255,0.045); }
    100%{ transform: scale(1); background: rgba(255,255,255,0.02); }
  }

  /* sweep line */
  .sweep{
    position:absolute; top:0; left:-30%;
    width:45%; height:100%;
    background: linear-gradient(90deg, rgba(0,0,0,0), rgba(140,80,255,0.08), rgba(96,211,255,0.06), rgba(0,0,0,0));
    transform: skewX(-14deg);
    animation: sweep 6.6s linear infinite;
    pointer-events:none;
    mix-blend-mode: screen;
  }
  @keyframes sweep{
    0%{ left:-60%; }
    100%{ left:120%; }
  }

  /* content overlay */
  .meta {
    position:absolute; left:18px; top:18px; z-index:2;
    background: rgba(3,6,12,0.3); padding:10px 12px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.03);
  }
  .meta h1{ margin:0; font-size:1.05rem; }
  .meta p{ margin:4px 0 0; color:#bfeaff; font-size:0.88rem; }

  @media (max-width:700px){
    .grid{ gap:4px; grid-template-columns: repeat(8,1fr); }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="meta">
      <h1>ctxzero — Recon Grid</h1>
      <p>Subtile scan visualization — professional & minimal</p>
    </div>

    <div class="grid" id="grid"></div>
    <div class="sweep"></div>
  </div>

<script>
/* build grid dynamically and stagger animations slightly */
const grid = document.getElementById('grid');
const cols = window.innerWidth < 700 ? 8 : 16;
const rows = Math.ceil((560 - 36) / 28); // approx rows to fill stage
const total = cols * 10; // keep reasonably sized grid (responsive)
for(let i=0;i<total;i++){
  const c = document.createElement('div');
  c.className = 'cell';
  c.style.setProperty('--i', i);
  grid.appendChild(c);
}

/* optional: subtle interactive hover to highlight neighbouring cells */
grid.addEventListener('mousemove', (e)=>{
  const rect = grid.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const children = Array.from(grid.children);
  children.forEach((ch)=>{
    const r = ch.getBoundingClientRect();
    const cx = r.left + r.width/2 - rect.left;
    const cy = r.top + r.height/2 - rect.top;
    const d = Math.hypot(cx - x, cy - y);
    const scale = Math.max(0.92, 1 - d / 800);
    ch.style.transform = `scale(${scale})`;
    ch.style.background = `rgba(255,255,255,${0.02 + Math.max(0, 0.02 - d/12000)})`;
  });
});
grid.addEventListener('mouseleave', ()=>{
  Array.from(grid.children).forEach(ch=>{
    ch.style.transform = '';
    ch.style.background = '';
  });
});
</script>
</body>
</html>
